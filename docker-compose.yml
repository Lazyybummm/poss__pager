services:
  db:
    image: mysql:8.0
    container_name: poss_pager_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_password_here
      MYSQL_DATABASE: poss_pager
      MYSQL_USER: poss_user
      MYSQL_PASSWORD: your_secure_password_here
    volumes:
      - db_data:/var/lib/mysql
      - ./pos_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - poss_pager_network
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_secure_password_here"]
      timeout: 20s
      retries: 10
      interval: 10s

  backend:
    build: ./pos-backend
    container_name: poss_pager_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: your_secure_password_here
      DB_NAME: poss_pager
      JWT_SECRET: your_super_secret_jwt_key_change_this
      API_URL: 0.0.0.0:8000
      PREFERRED_PORT: /dev/ttyUSB0
      BAUD_RATE: 115200
    depends_on:
      db:
        condition: service_healthy
    networks:
      - poss_pager_network
    ports:
      - "8000:8000"

  frontend:
    build: .
    container_name: poss_pager_frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - poss_pager_network
    ports:
      - "5173:5173"
    # Add volume mount for development (optional - enables hot reload)
    # volumes:
    #   - .:/app
    #   - /app/node_modules

volumes:
  db_data:

networks:
  poss_pager_network:
    driver: bridge